<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五平台数据分析报告</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f7fa;
      color: #333;
      line-height: 1.6;
      padding: 40px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 48px;
    }
    h1 {
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
    }
    h2 {
      font-size: 20px;
      color: #2563eb;
      margin: 32px 0 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e5e7eb;
    }
    h3 {
      font-size: 16px;
      color: #374151;
      margin: 24px 0 12px;
    }
    .card {
      background: #f8fafc;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .highlight {
      background: #eff6ff;
      border-left: 4px solid #2563eb;
      padding: 16px;
      margin: 16px 0;
      border-radius: 0 8px 8px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
      color: #374151;
    }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
    }
    .tag-success { background: #dcfce7; color: #166534; }
    .tag-warning { background: #fef3c7; color: #92400e; }
    .tag-info { background: #dbeafe; color: #1e40af; }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin: 16px 0;
    }
    .metric-item {
      text-align: center;
      padding: 16px;
      background: #f8fafc;
      border-radius: 8px;
    }
    .metric-value {
      font-size: 24px;
      font-weight: 700;
      color: #2563eb;
    }
    .metric-label {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 五平台数据分析报告</h1>
    <div class="subtitle">
      数据周期：{{PERIOD}}<br>
      生成日期：{{DATE}}<br>
      账号：醉雪梅花
    </div>

    <h2>一、全平台总览</h2>
    <div class="metric-grid">
      <div class="metric-item">
        <div class="metric-value">{{PLATFORM_COUNT}}</div>
        <div class="metric-label">发布平台数</div>
      </div>
      <div class="metric-item">
        <div class="metric-value">{{ARTICLE_COUNT}}</div>
        <div class="metric-label">累计文章数</div>
      </div>
      <div class="metric-item">
        <div class="metric-value">{{MAX_READ}}</div>
        <div class="metric-label">单篇最高阅读</div>
      </div>
      <div class="metric-item">
        <div class="metric-value">{{MAX_INTERACT}}</div>
        <div class="metric-label">单篇最高互动</div>
      </div>
    </div>

    <div class="highlight">
      <strong>一句话总结：</strong>{{SUMMARY}}
    </div>

    <h2>二、分平台深度分析</h2>
    {{PLATFORM_ANALYSIS}}

    <h2>三、跨平台对比</h2>
    {{CROSS_PLATFORM}}

    <h2>四、关键发现</h2>
    {{KEY_FINDINGS}}

    <h2>五、下一步行动建议</h2>
    {{NEXT_STEPS}}
  </div>
</body>
</html>
